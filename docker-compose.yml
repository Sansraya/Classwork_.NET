services:
  api:
    build: .
    container_name: aspnet-api
    ports:
      - "80:8080"
    depends_on:
      - db
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__Postgres=Host=localhost;Port=5432;Username=postgres;Password=test123;Database=SemManagementSystem
  db:
    image: postgres:17
    container_name: postgres-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: test123
      POSTGRES_DB: SemManagementSystem
    ports:
      - 5432:5432